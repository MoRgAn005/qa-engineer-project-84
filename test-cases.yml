---
- summary: |
    Проверка поиска товаров по ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову или категории
  prerequisites: |
    Открыта страница каталога товаров
  test-data: |
    Ключевое слово = "ноутбук"
  steps:
    - В поле поиска ввести ключевое слово "ноутбук"
    - Нажать кнопку "Поиск"
  expected-result: |
    В каталоге отображаются только товары, связанные с ключевым словом "ноутбук"

- summary: |
    Проверка фильтрации товаров по цене
  requirement: |
    Пользователь должен иметь возможность фильтровать товары
  prerequisites: |
    Открыта страница каталога товаров
  test-data: |
    Минимальная цена = 10000, Максимальная цена = 50000
  steps:
    - Установить минимальную цену 10000
    - Установить максимальную цену 50000
    - Применить фильтр
  expected-result: |
    В каталоге отображаются только товары в диапазоне цен от 10000 до 50000

- summary: |
    Проверка добавления товара в корзину
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  prerequisites: |
    Открыта страница товара
  test-data: |
    Название товара = "Ноутбук Pro X"
  steps:
    - Нажать кнопку "Добавить в корзину"
    - Перейти в корзину
  expected-result: |
    В корзине отображается товар "Ноутбук Pro X"

- summary: |
    Проверка удаления товара из корзины
  requirement: |
    Пользователь должен иметь возможность удалить товар из корзины
  prerequisites: |
    Корзина содержит товар "Ноутбук Pro X"
  test-data: |
    Название товара = "Ноутбук Pro X"
  steps:
    - Нажать кнопку "Удалить" рядом с товаром "Ноутбук Pro X"
  expected-result: |
    Товар "Ноутбук Pro X" удален из корзины

- summary: |
    Проверка оформления заказа
  requirement: |
    Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  prerequisites: |
    Корзина содержит товары
  test-data: |
    Адрес доставки = "ул. Ленина, д. 1", Email = "user@example.com"
  steps:
    - Заполнить форму заказа (адрес, email)
    - Нажать кнопку "Оформить заказ"
  expected-result: |
    Пользователь перенаправлен на страницу оплаты, а корзина очищена
